# A generic, single database configuration.

[alembic]
script_location = %(here)s/migrations

# Template for sequential numeric naming: 001_initial_schema.py
file_template = %%(rev)s_%%(slug)s

# To use sequential numbers, we need to customize the revision ID generation in migrations/env.py 
# or use a custom tool. Alembic's default is a random hash.
# However, for simplicity and manual control, we'll keep the hash as ID 
# but prefix the FILENAME with a counter.

prepend_sys_path = .
path_separator = os

# The URL is dynamically set in env.py, but we put a placeholder here
sqlalchemy.url = sqlite:///habits.db

[post_write_hooks]
# This will run ruff check and then ruff format on every new migration file
hooks = ruff_check, ruff_format

ruff_check.type = exec
ruff_check.executable = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
